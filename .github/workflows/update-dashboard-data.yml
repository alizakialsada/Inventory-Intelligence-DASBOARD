name: Update Dashboard Data

on:
  push:
    paths:
      - 'incoming/**'
      - 'scripts/update_dashboard.py'
      - 'dashboard-data.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlrd lxml html5lib beautifulsoup4

      - name: Update dashboard-data.js
        run: python scripts/update_dashboard.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.js incoming/update-info.json || true
          git commit -m "Auto update dashboard data" || echo "No changes to commit"
          git push
